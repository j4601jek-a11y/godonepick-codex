name: Build and deploy Mer summary site

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  push:
    branches:
      - main
    paths:
      - "mer_blog_html_digest.py"
      - ".github/workflows/mer-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate site HTML
        run: |
          mkdir -p site
          python mer_blog_html_digest.py --output site/index.html --refresh-seconds 1800

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
